<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      overflow: hidden;
    }

    .fullscreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      opacity: 1;
      transition: opacity 1000ms ease;
    }

    .fullscreen.fade-out {
      opacity: 0;
    }

    .hidden {
      display: none;
    }
  </style>

  <script src="common/vpinfe-core.js"></script>
  <script>
    const vpin = new VPinFECore();
    vpin.init();

    vpin.ready.then(async () => {
      console.log("VPinFECore is fully initialized");
      const windowName = await vpin.call("get_my_window_name");
      const isTableWindow = windowName === "table";
      const fadeMs = 1000;

      const redirectToTheme = async () => {
        const location = await vpin.call("get_theme_index_page");
        window.location = location;
      };

      const splashVideo = document.getElementById('splash');
      const splashImage = document.getElementById('splash-image');

      const fadeOutAndRedirect = () => {
        if (isTableWindow) {
          splashVideo.classList.add('fade-out');
        } else {
          splashImage.classList.add('fade-out');
        }
        setTimeout(redirectToTheme, fadeMs);
      };

      window.receiveEvent = (message) => {
        if (message && message.type === "SplashFadeOut") {
          fadeOutAndRedirect();
        }
      };

      if (isTableWindow) {
        splashImage.classList.add('hidden');
        splashVideo.classList.remove('hidden');

        splashVideo.addEventListener('ended', () => {
          vpin.sendMessageToAllWindowsIncSelf({ type: "SplashFadeOut" });
        }, { once: true });

        splashVideo.muted = false;
        splashVideo.defaultMuted = false;
        splashVideo.volume = 1.0;
        await splashVideo.play();
      } else {
        splashVideo.classList.add('hidden');
        splashImage.classList.remove('hidden');
      }

      // Fallback in case video metadata/playback fails.
      setTimeout(fadeOutAndRedirect, 15000);
    });
  </script>
</head>
<body>
  <video id="splash" class="fullscreen" autoplay playsinline>
    <source src="images/splash.mp4" type="video/mp4">
  </video>
  <img id="splash-image" class="fullscreen hidden" src="images/splash.png" alt="Splash">
</body>
</html>
