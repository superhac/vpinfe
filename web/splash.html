<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Loading...</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: black;
        overflow: hidden;
      }

      .fullscreen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 1;
        transition: opacity 1000ms ease;
      }

      .fullscreen.fade-out {
        opacity: 0;
      }

      .hidden {
        display: none;
      }

      #viewport {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #splash-root {
        position: relative;
        transform-origin: center center;
        visibility: hidden;
      }
    </style>

    <script src="common/vpinfe-core.js"></script>
    <script>
      const vpin = new VPinFECore();
      vpin.init();

      vpin.ready.then(async () => {
        console.log("VPinFECore is fully initialized");
        const windowName = await vpin.call("get_my_window_name");
        const isTableWindow = windowName === "table";
        const fadeMs = 1000;

        const redirectToTheme = async () => {
          const location = await vpin.call("get_theme_index_page");
          const currentParams = window.location.search;
          const separator = location.includes("?") ? "&" : "?";
          window.location = currentParams
            ? location + separator + currentParams.substring(1)
            : location;
        };

        const splashEnabledRaw = await vpin.call("get_splashscreen_enabled");
        const splashEnabledNormalized = String(splashEnabledRaw)
          .trim()
          .toLowerCase();
        const splashDisabled = ["false", "0", "no", "off"].includes(
          splashEnabledNormalized,
        );
        if (splashDisabled) {
          console.log("Splash disabled");
          redirectToTheme();
          return;
        }

        const splashRoot = document.getElementById("splash-root");
        const splashVideo = document.getElementById("splash");
        const splashVideoSource = document.getElementById("splash-source");
        const splashImage = document.getElementById("splash-image");

        const fadeOutAndRedirect = () => {
          if (isTableWindow) {
            splashVideo.classList.add("fade-out");
          } else {
            splashImage.classList.add("fade-out");
          }
          setTimeout(redirectToTheme, fadeMs);
        };

        window.receiveEvent = (message) => {
          if (message && message.type === "SplashFadeOut") {
            fadeOutAndRedirect();
          }
        };

        const applyRotation = (rotationDegree) => {
          const vw = window.innerWidth;
          const vh = window.innerHeight;
          const baseWidth = 1920;
          const baseHeight = 1080;
          const normalized = ((rotationDegree % 360) + 360) % 360;
          const swapAxes = normalized === 90 || normalized === 270;
          const scale = swapAxes
            ? Math.min(vw / baseHeight, vh / baseWidth)
            : Math.min(vw / baseWidth, vh / baseHeight);

          splashRoot.style.width = `${baseWidth}px`;
          splashRoot.style.height = `${baseHeight}px`;

          if (rotationDegree !== 0) {
            splashRoot.style.transform = `rotate(${rotationDegree}deg) scale(${scale})`;
          } else {
            splashRoot.style.transform = `scale(${scale})`;
          }

          requestAnimationFrame(() => {
            splashRoot.style.visibility = "visible";
          });
        };

        if (isTableWindow) {
          const cabMode = await vpin.call("get_cab_mode");
          const rotationDegree = await vpin.call("get_table_rotation");
          const effectiveRotationDegree =
            cabMode && rotationDegree !== 0
              ? rotationDegree + 90
              : rotationDegree;

          splashImage.classList.add("hidden");
          splashVideo.classList.remove("hidden");
          splashVideoSource.src = cabMode
            ? "images/splash-rotated.mp4"
            : "images/splash.mp4";
          splashVideo.load();
          applyRotation(effectiveRotationDegree);
          window.addEventListener("resize", () =>
            applyRotation(effectiveRotationDegree),
          );

          splashVideo.addEventListener(
            "ended",
            () => {
              vpin.sendMessageToAllWindowsIncSelf({ type: "SplashFadeOut" });
            },
            { once: true },
          );

          splashVideo.muted = false;
          splashVideo.defaultMuted = false;
          splashVideo.volume = 1.0;
          await splashVideo.play();
        } else {
          splashVideo.classList.add("hidden");
          splashImage.classList.remove("hidden");
          splashRoot.style.width = "100vw";
          splashRoot.style.height = "100vh";
          splashRoot.style.transform = "none";
          splashRoot.style.visibility = "visible";
        }

        // Fallback in case video metadata/playback fails.
        setTimeout(fadeOutAndRedirect, 15000);
      });
    </script>
  </head>
  <body>
    <div id="viewport">
      <div id="splash-root">
        <video id="splash" class="fullscreen" autoplay playsinline>
          <source id="splash-source" src="images/splash.mp4" type="video/mp4" />
        </video>
        <img
          id="splash-image"
          class="fullscreen hidden"
          src="images/splash.png"
          alt="Splash"
        />
      </div>
    </div>
  </body>
</html>
