<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pinball Primer Tutorial</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: rgba(0, 0, 0, 0);
      color: #f8fafc;
      font-family: sans-serif;
    }

    #tutorial-container {
      position: relative;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      transition: transform 0.25s ease;
    }

    #tutorial-shell {
      position: absolute;
      inset: 3vh 3vw;
      background: rgba(7, 12, 25, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 1.5rem;
      box-shadow: 0 0 36px rgba(15, 23, 42, 0.42);
      overflow: hidden;
    }

    #tutorial-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: linear-gradient(90deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.92));
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
    }

    #tutorial-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    #tutorial-help {
      font-size: 0.95rem;
      color: #cbd5e1;
      text-align: right;
    }

    #tutorial-body {
      position: absolute;
      inset: 4.75rem 0 0 0;
      background: #ffffff;
    }

    #tutorial-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      pointer-events: none;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div id="tutorial-container">
    <div id="tutorial-shell">
        <div id="tutorial-header">
          <div id="tutorial-title">Pinball Primer Tutorial</div>
        <div id="tutorial-help">Up/Left scroll up, Down/Right scroll down, T or Back to close</div>
        </div>
      <div id="tutorial-body">
        <iframe id="tutorial-frame" title="Pinball Primer Tutorial"></iframe>
      </div>
    </div>
  </div>

  <script>
    let currentProxyUrl = '';

    const tutorialFrame = document.getElementById('tutorial-frame');

    function scrollTutorial(amount) {
      try {
        const win = tutorialFrame.contentWindow;
        if (!win) return;
        win.scrollBy({ top: amount, left: 0, behavior: 'auto' });
      } catch (_e) {}
    }

    function handleInput(input) {
      switch (input) {
        case 'joyup':
        case 'joyleft':
          scrollTutorial(-140);
          break;
        case 'joydown':
        case 'joyright':
          scrollTutorial(140);
          break;
        case 'joyback':
          window.parent.vpin.toggleTutorial();
          break;
      }
    }

    window.parent.vpin.registerInputHandlerTutorial(handleInput);

    window.addEventListener('keydown', (e) => {
      if (e.key === 't' || e.key === 'T' || e.key === 'Escape') {
        window.parent.vpin.toggleTutorial();
        e.preventDefault();
      } else if (e.key === 'ArrowUp') {
        handleInput('joyup');
        e.preventDefault();
      } else if (e.key === 'ArrowDown') {
        handleInput('joydown');
        e.preventDefault();
      } else if (e.key === 'ArrowLeft') {
        handleInput('joyleft');
        e.preventDefault();
      } else if (e.key === 'ArrowRight') {
        handleInput('joyright');
        e.preventDefault();
      }
    });

    window.addEventListener('message', (event) => {
      const message = event.data;
      if (!message) return;

      if (message.event === 'tutorial_open') {
        currentProxyUrl = message.tutorial_proxy_url || '';
        tutorialFrame.src = currentProxyUrl;
        return;
      }

      if (message.event === 'reset state') {
        currentProxyUrl = '';
        tutorialFrame.src = 'about:blank';
      }
    });
  </script>
</body>
</html>
